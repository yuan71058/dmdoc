<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>表示使用哪个字库文件进行识别<span lang=EN-US>(index</span>范围<span
lang=EN-US>:0-99)</span></span></p>

<p><span style='font-size:13.5pt'>设置之后，永久生效，除非再次设定<span lang=EN-US><br
style='mso-special-character:line-break'>
<br style='mso-special-character:line-break'>
</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=GramE>long</span> <span class=SpellE>UseDict</span>(index)</span></p>

<p><span class=style11><span style='font-size:13.5pt'>参数定义<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
index </span><span style='font-size:13.5pt;color:maroon'>整形数</span><span
lang=EN-US style='font-size:13.5pt'>:</span><span style='font-size:13.5pt'>字库编号<span
lang=EN-US>(0-99)</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0:</span><span style='font-size:13.5pt'>失败<span lang=EN-US><br>
1:</span>成功<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=SpellE>dm_ret</span> = <span class=SpellE><span class=GramE>dm.UseDict</span></span><span
class=GramE>(</span>1)<br>
<span class=SpellE>ss</span> = <span class=SpellE>dm.Ocr</span>(0,0,2000,2000,&quot;FFFFFF-000000&quot;,1.0)<br>
<span class=SpellE>dm_ret</span> = <span class=SpellE>dm.UseDict</span>(0)</span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>
