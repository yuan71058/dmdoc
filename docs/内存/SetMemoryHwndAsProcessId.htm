<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>设置是否把所有内存接口函数中的窗口句柄当作进程<span lang=EN-US>ID,</span>以支持直接<span
class=GramE>以进程</span><span lang=EN-US>ID</span>来使用内存接口<span lang=EN-US>.</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=GramE>long</span> <span class=SpellE>SetMemoryHwndAsProcessId</span>(en)</span></p>

<p class=style1>参数定义<span lang=EN-US>:<br>
<br>
</span><span lang=EN-US style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'>en </span><span style='font-size:13.5pt;color:maroon'>整形数</span><span
lang=EN-US style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'>: </span><span style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'>取值如下<span lang=EN-US><br>
<span style='mso-tab-count:1'>&nbsp;&nbsp;&nbsp; </span><span
style='mso-spacerun:yes'>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
</span>0 : </span>关闭<span lang=EN-US><span style='mso-spacerun:yes'>&nbsp;
</span>1 : </span>开启<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0 : </span><span style='font-size:13.5pt'>失败<span lang=EN-US><br>
1 : </span>成功<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span class=SpellE><span lang=EN-US style='font-size:13.5pt'>dm.SetMemoryHwndAsProcessId</span></span><span
lang=EN-US style='font-size:13.5pt'> 1</span></p>

<p><span style='font-size:13.5pt;color:fuchsia'>注<span lang=EN-US>: </span>默认是当作窗口句柄<span
lang=EN-US>.<br style='mso-special-character:line-break'>
<br style='mso-special-character:line-break'>
</span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>
