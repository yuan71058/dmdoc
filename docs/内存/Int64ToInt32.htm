<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>强制转换<span lang=EN-US>64</span>位整数为<span
lang=EN-US>32</span>位<span lang=EN-US>. <span style='color:fuchsia'>(</span></span><span
style='color:fuchsia'>这个函数是给按键精灵设计的<span lang=EN-US>,</span>由于按键精灵不支持<span
lang=EN-US>64</span>位自动化变量<span lang=EN-US>,</span>某些返回<span lang=EN-US>64</span>位的整数的接口会出错<span
lang=EN-US>)</span></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=GramE>long</span> Int64ToInt32(value)</span></p>

<p class=style1>参数定义<span lang=EN-US>:<br>
<br>
</span><span lang=EN-US style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'>value </span><span style='font-size:13.5pt;font-weight:normal;mso-bidi-font-weight:
bold'>长整形数</span><span lang=EN-US style='font-size:13.5pt;color:maroon'>:</span><span
lang=EN-US style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'> </span><span style='color:windowtext;font-weight:normal;mso-bidi-font-weight:
bold'>需要转换的<span lang=EN-US>64</span>位整数</span><span lang=EN-US
style='font-size:13.5pt'></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
</span><span style='font-size:13.5pt'>返回的<span lang=EN-US>32</span>位整数<span
lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>

<p><span lang=EN-US style='font-size:13.5pt'>base_addr = <span class=GramE>dm.Int64ToInt32(</span>dm.GetMoudleBaseAddr(hwnd,&quot;ntdll.dll&quot;))<span
style='color:fuchsia'></span></span></p>
