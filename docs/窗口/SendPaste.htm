<body lang=ZH-CN style='tab-interval:21.0pt'>

<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>向指定窗口发送粘贴命令<span lang=EN-US>. </span>把剪贴板的内容发送到目标窗口<span
lang=EN-US>.</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=GramE>long</span> <span class=SpellE>SendPaste</span>(<span
class=SpellE>hwnd</span>) </span></p>

<p><span class=style11><span style='font-size:13.5pt'>参数定义<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
<span class=SpellE>hwnd</span> </span><span style='font-size:13.5pt;color:maroon'>整形数</span><span
lang=EN-US style='font-size:13.5pt'>: </span><span style='font-size:13.5pt'>指定的窗口句柄<span
lang=EN-US>. </span>如果为<span lang=EN-US>0,</span>则对当前激活的窗口发送<span lang=EN-US>.</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0: </span><span style='font-size:13.5pt'>失败<span lang=EN-US><br>
1: </span>成功<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span class=SpellE><span lang=EN-US style='font-size:13.5pt'>dm.SetClipboard</span></span><span
lang=EN-US style='font-size:13.5pt'> &quot;<span class=SpellE>abcd</span>&quot;<br>
<span class=SpellE>dm.SendPaste</span> <span class=SpellE>hwnd</span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>

<p><span style='font-size:13.5pt;color:fuchsia'>注<span lang=EN-US>:</span>剪贴板是公共资源，多个线程同时设置剪贴板时<span
lang=EN-US>,</span>会产生冲突，必须用互斥信号保护<span lang=EN-US>.</span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>
