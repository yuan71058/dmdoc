<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>: </span></span></p>

<p><span style='font-size:13.5pt'>把屏幕坐标转换为窗口坐标<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
long ScreenToClient(hwnd,x,y) </span></p>

<p><span class=style11><span style='font-size:13.5pt'>参数定义<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
hwnd </span><span style='font-size:13.5pt;color:maroon'>整形数</span><span
lang=EN-US style='font-size:13.5pt'>: </span><span style='font-size:13.5pt'>指定的窗口句柄<span
lang=EN-US><br>
<br>
x </span><span style='color:fuchsia'>变参指针</span><span lang=EN-US>: </span>屏幕<span
lang=EN-US>X</span>坐标<span lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>y </span><span style='font-size:
13.5pt;color:fuchsia'>变参指针</span><span lang=EN-US style='font-size:13.5pt'>: </span><span
style='font-size:13.5pt'>屏幕<span lang=EN-US>Y</span>坐标<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0: </span><span style='font-size:13.5pt'>失败<span lang=EN-US><br>
1: </span>成功<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>x = 100:y = 100 <br>
dm_ret = dm.ScreenToClient(hwnd,x,y) </span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>
