<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>停止指定的音乐<span lang=EN-US>.</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
long Stop(id)</span></p>

<p><span class=style11><span style='font-size:13.5pt'>参数定义<span lang=EN-US>:</span></span><span
lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>id </span><span style='font-size:
13.5pt;color:maroon'>整形数</span><span lang=EN-US style='font-size:13.5pt'>: Play</span><span
style='font-size:13.5pt'>返回的播放<span lang=EN-US>id.</span></span><span
class=style11><span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0 : </span><span style='font-size:13.5pt'>失败<span lang=EN-US><br>
1 : </span>成功<span lang=EN-US>.</span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span lang=EN-US style='font-size:13.5pt'><br>
// test.mp3</span><span style='font-size:13.5pt'>放于<span lang=EN-US>d:\test</span>目录下<span
lang=EN-US><br>
dm.SetPath &quot;d:\test&quot;<br>
id = dm.Play(&quot;test.mp3&quot;)<br style='mso-special-character:line-break'>
<br style='mso-special-character:line-break'>
</span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>// </span><span style='font-size:
13.5pt'>绝对路径<span lang=EN-US><br>
id = dm.Play(&quot;d:\test\test.mp3&quot;)<br>
Delay 1000<br>
dm.Stop id</span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>
