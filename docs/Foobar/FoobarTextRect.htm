<div class=Section1>

<p class=style1><span style='font-size:13.5pt'>函数简介<span lang=EN-US>:</span></span></p>

<p><span style='font-size:13.5pt'>设置指定<span lang=EN-US>Foobar</span>窗口的滚动文本框范围<span
lang=EN-US>,</span>默认的文本框范围是窗口区域<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>函数原型<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
long FoobarTextRect(hwnd,x,y,w,h) </span></p>

<p><span class=style11><span style='font-size:13.5pt'>参数定义<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'><br>
<br>
hwnd </span><span style='font-size:13.5pt;color:maroon'>整形数</span><span
lang=EN-US style='font-size:13.5pt'>: </span><span style='font-size:13.5pt'>指定的<span
lang=EN-US>Foobar</span>窗口句柄<span lang=EN-US>,</span>此句柄必须是通过<span lang=EN-US>CreateFoobarxxx</span>创建而来<span
lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>x </span><span style='font-size:
13.5pt;color:maroon'>整形数</span><span lang=EN-US style='font-size:13.5pt'>: x</span><span
style='font-size:13.5pt'>坐标<span lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>y </span><span style='font-size:
13.5pt;color:maroon'>整形数</span><span lang=EN-US style='font-size:13.5pt'>: y</span><span
style='font-size:13.5pt'>坐标<span lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>w </span><span style='font-size:
13.5pt;color:maroon'>整形数</span><span lang=EN-US style='font-size:13.5pt'>: </span><span
style='font-size:13.5pt'>宽度<span lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>h </span><span style='font-size:
13.5pt;color:maroon'>整形数</span><span lang=EN-US style='font-size:13.5pt'>: </span><span
style='font-size:13.5pt'>高度<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>返回值<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span style='font-size:13.5pt;color:maroon'>整形数<span lang=EN-US>:</span></span><span
lang=EN-US style='font-size:13.5pt'><br>
0 : </span><span style='font-size:13.5pt'>失败<span lang=EN-US></span></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>1 : </span><span style='font-size:
13.5pt'>成功<span lang=EN-US></span></span></p>

<p><span class=style11><span style='font-size:13.5pt'>示例<span lang=EN-US>:</span></span></span><span
lang=EN-US style='font-size:13.5pt'></span></p>

<p><span lang=EN-US style='font-size:13.5pt'>dm_ret = dm.FoobarTextRect(foobar,10,10,100,200)</span></p>

<p><span lang=EN-US style='font-size:13.5pt'>&nbsp;</span></p>
